fail_fast: true

default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      # ── 快速检查（先执行，失败即退出）──
      - id: ruff
        name: ruff check
        entry: uv run ruff check
        language: system
        always_run: true
        pass_filenames: false

      - id: vulture
        name: vulture
        entry: uv run vulture laffyhand/ --min-confidence 70
        language: system
        always_run: true
        pass_filenames: false

      # ── 较慢检查 ──
      - id: mypy
        name: mypy
        entry: uv run mypy laffyhand/
        language: system
        always_run: true
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest tests/
        language: system
        always_run: true
        pass_filenames: false

      # ── 前端 ──
      - id: eslint
        name: eslint
        entry: bash -c 'cd laffyhand/ui && pnpm lint'
        language: system
        always_run: true
        pass_filenames: false

      - id: vitest
        name: vitest
        entry: bash -c 'cd laffyhand/ui && pnpm vitest run'
        language: system
        always_run: true
        pass_filenames: false

      - id: build
        name: UI build (tsc + vite)
        entry: bash -c 'cd laffyhand/ui && pnpm build'
        language: system
        always_run: true
        pass_filenames: false

      # ── commit-msg ──
      - id: commit-msg
        name: commit message format
        entry: hooks/commit-msg.sh
        language: script
        stages: [commit-msg]
